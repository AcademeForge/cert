<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AcademeForge — Certificate Verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: dark light;
  --bg: #080B14;
  --surf: #111827;
  --surf-2: #1A2235;
  --bdr: rgba(255,255,255,.08);
  --pri: #6C63FF;
  --suc: #10D98A;
  --dan: #FF5F7E;
  --t-1: #F0F2FF;
  --t-2: #A8B2CC;
  --t-3: #5C6882;
  --ff: 'Plus Jakarta Sans', sans-serif;
  --ff-m: 'JetBrains Mono', monospace;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #F3F4F6;
    --surf: #FFFFFF;
    --surf-2: #F9FAFB;
    --bdr: rgba(0,0,0,.08);
    --t-1: #111827;
    --t-2: #4B5563;
    --t-3: #9CA3AF;
  }
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--ff); background: var(--bg); color: var(--t-1);
  min-height: 100dvh; display: flex; flex-direction: column; align-items: center; padding: 20px 16px;
}
.wrap { width: 100%; max-width: 500px; margin: auto; }
.card { background: var(--surf); border: 1px solid var(--bdr); border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,.05); }

/* Status States */
.state { display: none; text-align: center; }
.state.show { display: block; }
.spin { width: 40px; height: 40px; border: 4px solid var(--bdr); border-top-color: var(--pri); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Success Result Styling */
.status-banner { display: flex; align-items: center; gap: 14px; padding-bottom: 16px; border-bottom: 1px solid var(--bdr); margin-bottom: 16px; }
.status-icon { font-size: 2.5rem; filter: drop-shadow(0 2px 8px rgba(16,217,138,0.25)); }
.status-title { font-weight: 700; font-size: 1.2rem; color: var(--suc); }
.status-id { font-family: var(--ff-m); font-size: 0.8rem; color: var(--t-2); background: var(--surf-2); border: 1px solid var(--bdr); padding: 4px 10px; border-radius: 6px; margin-top: 4px; display: inline-block; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.cell { background: var(--surf-2); border: 1px solid var(--bdr); border-radius: 8px; padding: 12px; }
.cell-val { font-weight: 600; font-size: 0.85rem; color: var(--t-1); word-break: break-word; }
.cell-lbl { font-size: 0.6rem; color: var(--t-3); text-transform: uppercase; font-weight: 700; margin-top: 4px; }
.full-width { grid-column: span 2; }
.highlight { border-color: rgba(16,217,138,0.2); background: rgba(16,217,138,0.03); }

footer { text-align: center; font-size: 0.7rem; color: var(--t-3); margin-top: 24px; }
</style>
</head>
<body>

<div class="wrap">
  <div class="card state show" id="loadingCard">
    <div class="spin"></div>
    <div style="font-size:0.9rem; color:var(--t-2)">Authenticating Certificate...</div>
  </div>

  <div class="card state" id="resultCard" style="text-align: left;">
    <div class="status-banner">
      <div class="status-icon">✅</div>
      <div>
        <div class="status-title">Verified Authentic</div>
        <div class="status-id" id="resId">-</div>
      </div>
    </div>
    <div class="grid" id="detailGrid"></div>
    <div style="font-size: 0.7rem; color: var(--t-3); text-align: center; margin-top: 10px;">
      AcademeForge Secure Verification
    </div>
  </div>

  <footer>&copy; 2026 AcademeForge</footer>
</div>

<script>
const API_URL = "https://afooyyydhlwngzssgqih.supabase.co/functions/v1/af-certificate-api";

/* STRICT REDIRECT & AUTO-VERIFY */
(async () => {
  const p = new URLSearchParams(window.location.search);
  const id = p.get('id') || p.get('cert') || p.get('certificate_id');
  
  if (!id) {
    window.location.replace("https://cert.academeforge.in");
    return;
  }

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'verify', certificate_id: id })
    });
    const data = await res.json();
    
    if (data.success && data.found) {
      showResult(data.record);
    } else {
      window.location.replace("https://cert.academeforge.in");
    }
  } catch(e) {
    window.location.replace("https://cert.academeforge.in");
  }
})();

function showResult(r) {
  document.getElementById('resId').textContent = r.certificate_id || '—';
  
  const cells = [];
  if(r.full_name) cells.push(`<div class="cell full-width"><div class="cell-val">${r.full_name}</div><div class="cell-lbl">Recipient Name</div></div>`);
  if(r.role) cells.push(`<div class="cell"><div class="cell-val">${r.role}</div><div class="cell-lbl">Role / Designation</div></div>`);
  if(r.department) cells.push(`<div class="cell"><div class="cell-val">${r.department}</div><div class="cell-lbl">Department</div></div>`);
  if(r.certificate_type) cells.push(`<div class="cell"><div class="cell-val">${r.certificate_type}</div><div class="cell-lbl">Credential Type</div></div>`);
  if(r.issue_date) cells.push(`<div class="cell"><div class="cell-val">${new Date(r.issue_date).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'})}</div><div class="cell-lbl">Date of Issue</div></div>`);
  
  // Verification Timestamp
  cells.push(`<div class="cell full-width highlight"><div class="cell-val">${new Date().toLocaleString('en-IN')}</div><div class="cell-lbl">Verified On</div></div>`);
  
  document.getElementById('detailGrid').innerHTML = cells.join('');
  document.getElementById('loadingCard').classList.remove('show');
  document.getElementById('resultCard').classList.add('show');
}
</script>
</body>
</html>
