<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AcademeForge — Verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: dark light;
  --bg: #080B14;
  --surf: #111827;
  --surf-2: #1A2235;
  --bdr: rgba(255,255,255,.08);
  --pri: #6C63FF;
  --suc: #10D98A;
  --dan: #FF5F7E;
  --t-1: #F0F2FF;
  --t-2: #A8B2CC;
  --t-3: #5C6882;
  --ff: 'Plus Jakarta Sans', sans-serif;
  --ff-m: 'JetBrains Mono', monospace;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #F3F4F6;
    --surf: #FFFFFF;
    --surf-2: #F9FAFB;
    --bdr: rgba(0,0,0,.08);
    --t-1: #111827;
    --t-2: #4B5563;
    --t-3: #9CA3AF;
  }
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--ff); background: var(--bg); color: var(--t-1);
  min-height: 100dvh; display: flex; flex-direction: column; align-items: center; padding: 20px 16px;
}
.wrap { width: 100%; max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 16px; }

header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 8px; border-bottom: 1px solid var(--bdr); }
.logo { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.02em; }
.badge { font-size: 0.65rem; font-weight: 700; padding: 4px 8px; border-radius: 99px; background: rgba(16,217,138,.15); color: var(--suc); text-transform: uppercase; }

.card { background: var(--surf); border: 1px solid var(--bdr); border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,.05); }

/* Input Elements */
.input-grp { display: flex; gap: 8px; margin-top: 6px; }
input {
  flex: 1; height: 46px; background: var(--surf-2); border: 1px solid var(--bdr); border-radius: 10px;
  padding: 0 12px; font-family: var(--ff-m); color: var(--t-1); font-size: 0.9rem; text-transform: uppercase;
}
input::placeholder { text-transform: none; font-family: var(--ff); color: var(--t-3); }
input:focus { border-color: var(--pri); outline: none; }
button {
  height: 46px; background: var(--pri); color: #fff; border: none; border-radius: 10px;
  padding: 0 16px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: opacity 0.2s;
}
button:hover { opacity: 0.9; }
button:disabled { opacity: 0.35; cursor: not-allowed; }

/* Status Cards */
.state { display: none; text-align: center; padding: 30px 10px; }
.state.show { display: block; }
.spin { width: 32px; height: 32px; border: 3px solid var(--bdr); border-top-color: var(--pri); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.status-banner { display: flex; align-items: center; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid var(--bdr); margin-bottom: 16px; }
.status-icon { font-size: 2rem; }
.status-title { font-weight: 700; font-size: 1.1rem; }
.status-id { font-family: var(--ff-m); font-size: 0.75rem; color: var(--pri); background: rgba(108,99,255,0.1); padding: 2px 6px; border-radius: 4px; margin-top: 2px; display: inline-block; }

/* Data Grid */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.cell { background: var(--surf-2); border: 1px solid var(--bdr); border-radius: 8px; padding: 10px 12px; }
.cell-val { font-weight: 600; font-size: 0.85rem; color: var(--t-1); word-break: break-word; }
.cell-lbl { font-size: 0.65rem; color: var(--t-3); text-transform: uppercase; font-weight: 600; margin-top: 2px; }
.full-width { grid-column: span 2; }

.desc { background: var(--surf-2); border: 1px solid var(--bdr); border-radius: 8px; padding: 12px; font-size: 0.8rem; color: var(--t-2); line-height: 1.5; margin-bottom: 16px; }
.btn-alt { background: var(--surf-2); color: var(--t-1); border: 1px solid var(--bdr); width: 100%; margin-top: 8px; }

footer { text-align: center; font-size: 0.7rem; color: var(--t-3); padding-top: 16px; }
footer a { color: var(--pri); text-decoration: none; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">AcademeForge</div>
    <div class="badge">Secure Verification</div>
  </header>

  <div class="card">
    <div class="input-grp">
      <input type="text" id="certInput" placeholder="Enter Certificate ID" autocomplete="off" spellcheck="false" oninput="onInput()" onkeydown="if(event.key==='Enter')verify()">
      <button id="verifyBtn" onclick="verify()" disabled>Verify</button>
    </div>
  </div>

  <div class="card state" id="loadingCard">
    <div class="spin"></div>
    <div style="font-size:0.9rem; color:var(--t-2)">Validating credential database...</div>
  </div>

  <div class="card state" id="notFoundCard">
    <div style="font-size: 2.5rem; margin-bottom: 8px;">🚫</div>
    <div style="font-weight:700; font-size:1.1rem; color:var(--dan); margin-bottom: 4px;">Invalid Certificate</div>
    <div style="font-size:0.8rem; color:var(--t-2); line-height:1.4; max-width:320px; margin:0 auto;" id="nfMsg">No active records match this ID.</div>
  </div>

  <div class="card state" id="errorCard">
    <div style="font-size: 2rem; margin-bottom: 8px;">⚠️</div>
    <div style="font-weight:700; font-size:0.95rem; margin-bottom: 12px;">Network Error</div>
    <button class="btn-alt" style="margin:0; height:38px;" onclick="verify()">Retry Connection</button>
  </div>

  <div class="card state" id="resultCard" style="text-align: left;">
    <div class="status-banner">
      <div class="status-icon">🏅</div>
      <div>
        <div class="status-title">Verified Authentic</div>
        <div class="status-id" id="resId">-</div>
      </div>
    </div>

    <div class="grid" id="detailGrid"></div>
    <div class="desc" id="descBlock" style="display: none;"></div>

    <button class="btn-alt" onclick="copyId()" id="copyBtn">Copy Certificate ID</button>
  </div>

  <footer>
    Verification Portal &copy; 2026 <a href="https://academeforge.in">AcademeForge</a>
  </footer>
</div>

<script>
const API_URL = "https://afooyyydhlwngzssgqih.supabase.co/functions/v1/af-certificate-api";

function onInput() {
  document.getElementById('verifyBtn').disabled = document.getElementById('certInput').value.trim().length < 2;
}

function clearStates() {
  ['loadingCard', 'notFoundCard', 'errorCard', 'resultCard'].forEach(id => document.getElementById(id).classList.remove('show'));
}

async function verify() {
  const id = document.getElementById('certInput').value.trim().toUpperCase();
  if(!id) return;

  clearStates();
  document.getElementById('loadingCard').classList.add('show');
  document.getElementById('verifyBtn').disabled = true;

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'verify', certificate_id: id })
    });
    const data = await res.json();
    
    document.getElementById('verifyBtn').disabled = false;
    clearStates();

    if(!data.success) { document.getElementById('errorCard').classList.add('show'); return; }
    if(!data.found) { 
      document.getElementById('nfMsg').innerHTML = `The ID <strong>${id}</strong> does not match any certificate in our records.`;
      document.getElementById('notFoundCard').classList.add('show'); 
    } else { 
      showResult(data.record); 
    }
  } catch(e) {
    document.getElementById('verifyBtn').disabled = false;
    clearStates();
    document.getElementById('errorCard').classList.add('show');
  }
}

function showResult(r) {
  document.getElementById('resId').textContent = r.certificate_id || '—';
  
  const cells = [];
  if(r.full_name) cells.push(`<div class="cell full-width"><div class="cell-val">${r.full_name}</div><div class="cell-lbl">Recipient Name</div></div>`);
  if(r.role) cells.push(`<div class="cell"><div class="cell-val">${r.role}</div><div class="cell-lbl">Role / Designation</div></div>`);
  if(r.department) cells.push(`<div class="cell"><div class="cell-val">${r.department}</div><div class="cell-lbl">Department</div></div>`);
  if(r.certificate_type) cells.push(`<div class="cell"><div class="cell-val">${r.certificate_type}</div><div class="cell-lbl">Credential Type</div></div>`);
  if(r.issue_date) cells.push(`<div class="cell"><div class="cell-val">${fmtDate(r.issue_date)}</div><div class="cell-lbl">Date of Issue</div></div>`);
  
  document.getElementById('detailGrid').innerHTML = cells.join('');

  const desc = document.getElementById('descBlock');
  if(r.description) {
    desc.style.display = 'block';
    desc.textContent = r.description;
  } else {
    desc.style.display = 'none';
  }

  document.getElementById('resultCard').classList.add('show');
}

function fmtDate(d) {
  if(!d) return '—';
  try { return new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }); } catch { return d; }
}

function copyId() {
  const id = document.getElementById('resId').textContent;
  navigator.clipboard.writeText(id);
  const btn = document.getElementById('copyBtn');
  btn.textContent = "Copied!";
  setTimeout(() => { btn.textContent = "Copy Certificate ID"; }, 2000);
}

/* AUTO-RUN FROM QR PARAMS */
(() => {
  const p = new URLSearchParams(window.location.search);
  const id = p.get('id') || p.get('cert') || p.get('certificate_id');
  if(id) {
    document.getElementById('certInput').value = id.toUpperCase();
    onInput();
    verify();
  }
})();
</script>
</body>
</html>
